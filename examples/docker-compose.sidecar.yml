# Hardened sidecar example for the MIT external-runtime path.
#
# The important property is that simplex-chat is not published to the host or
# internet. OpenClaw reaches it over a compose-only service name as
# ws://simplex-chat:5225. Do not add a `ports:` mapping for simplex-chat.
# The plugin requires allowUnsafeRemoteWs because Docker service names are
# non-loopback even though the port is not published to the host.

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    depends_on:
      simplex-chat:
        condition: service_healthy
    environment:
      OPENCLAW_CONFIG: /config/openclaw.json
    volumes:
      - ./openclaw:/config
      - openclaw-state:/state
    networks:
      - openclaw-private

  simplex-chat:
    build:
      context: ./docker/simplex-chat-runtime
    restart: unless-stopped
    command:
      - simplex-chat
      - -p
      - "5225"
      - --device-name
      - OpenClaw SimpleX
      - --files-folder
      - /var/lib/simplex/files
      - --temp-folder
      - /var/lib/simplex/tmp
    volumes:
      - simplex-state:/var/lib/simplex
    expose:
      - "5225"
    healthcheck:
      test:
        - CMD-SHELL
        - "nc -z 127.0.0.1 5225"
      interval: 10s
      timeout: 3s
      retries: 12
    networks:
      - openclaw-private

networks:
  openclaw-private:

volumes:
  openclaw-state:
  simplex-state:
